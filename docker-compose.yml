services:
  web:
    image: nginx:alpine
    container_name: frontend
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./html:/usr/share/nginx/html:ro
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: backend
    expose:
      - "5000"
    restart: unless-stopped
